<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="robots" content="noindex" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bullfrog Wine &amp; Spirits Owner Channel</title>
    <style>
      :root {
        color: #1e1b18;
        background: #f7f3ed;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .app-shell {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0 56px;
      }

      .topbar {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        padding-bottom: 24px;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 0.95;
      }

      .muted {
        color: #716960;
        line-height: 1.6;
      }

      .panel,
      .item {
        background: #fffdf8;
        border: 1px solid #ded5c8;
        border-radius: 8px;
        box-shadow: 0 18px 48px rgba(47, 38, 28, 0.08);
      }

      .panel {
        padding: 20px;
      }

      .login {
        display: grid;
        gap: 16px;
        max-width: 480px;
        margin-top: 32px;
      }

      .status {
        min-height: 24px;
        color: #5e4732;
        font-weight: 700;
      }

      .section-tabs {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin: 20px 0;
      }

      .tab,
      .button {
        border: 1px solid #2c2520;
        border-radius: 999px;
        background: #2c2520;
        color: white;
        cursor: pointer;
        padding: 10px 14px;
        font-weight: 800;
      }

      .tab {
        background: transparent;
        color: #2c2520;
      }

      .tab.active {
        background: #2c2520;
        color: white;
      }

      .button.secondary {
        background: transparent;
        color: #2c2520;
      }

      .button.danger {
        border-color: #1d5638;
        color: #1d5638;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        gap: 12px;
        margin: 16px 0;
      }

      .content-list {
        display: grid;
        gap: 14px;
      }

      .item {
        display: grid;
        gap: 12px;
        padding: 16px;
      }

      .field-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      label {
        display: grid;
        gap: 6px;
        color: #4d443c;
        font-size: 0.86rem;
        font-weight: 800;
      }

      input,
      textarea {
        width: 100%;
        border: 1px solid #cfc4b6;
        border-radius: 8px;
        background: white;
        color: #1e1b18;
        padding: 11px 12px;
      }

      textarea {
        min-height: 96px;
        resize: vertical;
      }

      .full {
        grid-column: 1 / -1;
      }

      .image-row {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 12px;
        align-items: center;
      }

      .preview {
        width: 120px;
        aspect-ratio: 1;
        border: 1px solid #d8cfc3;
        border-radius: 8px;
        object-fit: cover;
        background: #efe8df;
      }

      .hide {
        display: none;
      }

      /* Tasting calendar */
      .cal-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 12px;
      }

      .cal-title {
        font-size: 1.15rem;
        font-weight: 800;
      }

      .cal-nav {
        display: flex;
        gap: 8px;
      }

      .cal-grid {
        display: grid;
        grid-template-columns: repeat(7, minmax(0, 1fr));
        gap: 6px;
      }

      .cal-weekday {
        text-align: center;
        font-size: 0.72rem;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #716960;
        padding: 4px 0;
      }

      .cal-day {
        min-height: 74px;
        padding: 6px;
        border: 1px solid #ded5c8;
        border-radius: 8px;
        background: white;
        cursor: pointer;
        text-align: left;
        display: grid;
        align-content: start;
        gap: 4px;
      }

      .cal-day:hover {
        border-color: #1d5638;
      }

      .cal-day.empty {
        background: transparent;
        border: 0;
        cursor: default;
      }

      .cal-day.has-note {
        background: #e4f0e6;
        border-color: #1d5638;
      }

      .cal-day.selected {
        outline: 3px solid #1d5638;
        outline-offset: -1px;
      }

      .cal-day-number {
        font-weight: 800;
        font-size: 0.85rem;
      }

      .cal-day-note {
        font-size: 0.7rem;
        line-height: 1.35;
        color: #33413a;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 3;
        -webkit-box-orient: vertical;
      }

      .cal-editor {
        margin-top: 16px;
        display: grid;
        gap: 10px;
      }

      .cal-editor-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .cal-upcoming {
        margin-top: 20px;
        display: grid;
        gap: 8px;
      }

      .cal-upcoming-item {
        display: flex;
        gap: 10px;
        align-items: baseline;
        font-size: 0.88rem;
        border-top: 1px solid #ded5c8;
        padding-top: 8px;
      }

      .cal-upcoming-item strong {
        white-space: nowrap;
      }

      @media (max-width: 720px) {
        .topbar,
        .toolbar,
        .field-grid,
        .image-row {
          grid-template-columns: 1fr;
          display: grid;
        }

        .preview {
          width: 100%;
          max-width: 220px;
        }

        .cal-day {
          min-height: 54px;
        }

        .cal-day-note {
          display: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="app-shell">
      <div class="topbar">
        <div>
          <h1>Bullfrog Wine &amp; Spirits updates</h1>
          <p class="muted">Post updates and events, manage the site's photos, and schedule tasting slots.</p>
        </div>
        <button class="button secondary hide" id="saveTop" type="button">Save changes</button>
      </div>

      <section class="panel login" id="loginPanel">
        <h2>Owner login</h2>
        <p class="muted">Enter the owner password to open the editor.</p>
        <label>
          Password
          <input id="passwordInput" type="password" autocomplete="current-password" />
        </label>
        <button class="button" id="loginButton" type="button">Open editor</button>
        <p class="status" id="loginStatus"></p>
      </section>

      <section class="hide" id="editor">
        <div class="section-tabs" id="tabs"></div>
        <section class="panel">
          <div class="toolbar">
            <div>
              <h2 id="sectionTitle"></h2>
              <p class="muted" id="sectionHelp"></p>
            </div>
            <button class="button secondary" id="addItem" type="button">Add item</button>
          </div>
          <div class="content-list" id="contentList"></div>
          <div class="toolbar">
            <p class="status" id="saveStatus"></p>
            <button class="button" id="saveBottom" type="button">Save changes</button>
          </div>
        </section>
      </section>
    </main>

    <script>
      const sections = {
        updateTicker: {
          label: 'Top ticker',
          help: 'Short messages that scroll across the top of the home page.',
          fields: [{ name: 'value', label: 'Message', type: 'text' }],
          empty: () => ''
        },
        premiumShelf: {
          label: 'Premium shelf',
          help: 'Bottle cards on the home page premium shelf section.',
          fields: [
            { name: 'name', label: 'Bottle name' },
            { name: 'category', label: 'Category label' },
            { name: 'note', label: 'Description', type: 'textarea' },
            { name: 'image', label: 'Image', type: 'image' }
          ],
          empty: () => ({ name: '', category: '', note: '', image: '' })
        },
        updateMoments: {
          label: 'Home updates',
          help: 'Small update cards near the bottom of the home page.',
          fields: [
            { name: 'kicker', label: 'Label' },
            { name: 'title', label: 'Title' },
            { name: 'body', label: 'Description', type: 'textarea' }
          ],
          empty: () => ({ kicker: '', title: '', body: '' })
        },
        featuredUpdates: {
          label: 'Updates page',
          help: 'Main update and event cards on the Updates page.',
          fields: [
            { name: 'kicker', label: 'Label' },
            { name: 'title', label: 'Title' },
            { name: 'body', label: 'Description', type: 'textarea' },
            { name: 'cta', label: 'Footer note' },
            { name: 'image', label: 'Image', type: 'image' }
          ],
          empty: () => ({ kicker: '', title: '', body: '', cta: '', image: '' })
        },
        tastingUpdates: {
          label: 'Tastings',
          help: 'Tasting and pop-up cards on the Updates page.',
          fields: [
            { name: 'kicker', label: 'Label' },
            { name: 'title', label: 'Title' },
            { name: 'body', label: 'Description', type: 'textarea' },
            { name: 'image', label: 'Image', type: 'image' },
            { name: 'alt', label: 'Image description' }
          ],
          empty: () => ({ kicker: '', title: '', body: '', image: '', alt: '' })
        },
        siteGallery: {
          label: 'Photo gallery',
          help: 'The scrolling photo strip on the home page. Add new pictures or remove old ones.',
          fields: [
            { name: 'src', label: 'Image', type: 'image' },
            { name: 'caption', label: 'Caption' },
            { name: 'alt', label: 'Image description' }
          ],
          empty: () => ({ src: '', caption: '', alt: '' })
        },
        sitePhotos: {
          label: 'Site photos',
          help: 'The main photos built into the site. Upload a new image to replace one.',
          type: 'slots',
          slots: [
            { key: 'heroPoster', label: 'Home page hero photo (big banner at the top)' },
            { key: 'contactImage', label: 'Contact page photo' },
            { key: 'storyBeer', label: 'Home page beer card photo' },
            { key: 'storyWine', label: 'Home page wine card photo' },
            { key: 'storySpirits', label: 'Home page spirits card photo' }
          ]
        },
        tastingCalendar: {
          label: 'Tasting calendar',
          help: 'Private scheduling calendar. Click a day and write a note to book a vendor tasting slot. Only you can see this.',
          type: 'calendar'
        }
      };

      let password = '';
      let content = {};
      let activeSection = 'featuredUpdates';
      let pendingImages = [];
      let calCursor = new Date();
      let selectedDate = '';

      const loginPanel = document.getElementById('loginPanel');
      const editor = document.getElementById('editor');
      const loginStatus = document.getElementById('loginStatus');
      const saveStatus = document.getElementById('saveStatus');
      const contentList = document.getElementById('contentList');
      const sectionTitle = document.getElementById('sectionTitle');
      const sectionHelp = document.getElementById('sectionHelp');
      const tabs = document.getElementById('tabs');
      const saveTop = document.getElementById('saveTop');
      const addItemButton = document.getElementById('addItem');

      const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
      const weekdays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

      const sanitizeFileName = (name) => {
        const parts = name.toLowerCase().split('.');
        const extension = parts.length > 1 ? parts.pop().replace(/[^a-z0-9]/g, '') : 'jpg';
        const base = parts.join('.').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'upload';
        return `${Date.now()}-${base}.${extension}`;
      };

      const readFileAsDataUrl = (file) =>
        new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });

      async function request(path, options = {}) {
        const response = await fetch(path, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            ...(options.headers || {})
          }
        });

        const payload = await response.json().catch(() => ({}));

        if (!response.ok) {
          throw new Error(payload.error || 'Something went wrong.');
        }

        return payload;
      }

      function setItemValue(index, field, value) {
        if (activeSection === 'updateTicker') {
          content[activeSection][index] = value;
          return;
        }

        content[activeSection][index][field] = value;
      }

      function buildImageControl(currentValue, onValue) {
        const row = document.createElement('div');
        row.className = 'image-row';

        const preview = document.createElement('img');
        preview.className = 'preview';
        preview.alt = '';
        preview.src = currentValue || '/favicon.svg';

        const controls = document.createElement('div');
        const pathInput = document.createElement('input');
        pathInput.value = currentValue || '';
        pathInput.placeholder = '/uploads/image.jpg';
        pathInput.addEventListener('input', (event) => {
          onValue(event.target.value);
          preview.src = event.target.value || '/favicon.svg';
        });

        const fileInput = document.createElement('input');
        fileInput.type = 'file';
        fileInput.accept = 'image/*';
        fileInput.addEventListener('change', async (event) => {
          const file = event.target.files[0];
          if (!file) return;

          const filename = sanitizeFileName(file.name);
          const publicPath = `/uploads/${filename}`;
          const repoPath = `public/uploads/${filename}`;
          const dataUrl = await readFileAsDataUrl(file);
          pendingImages.push({ path: repoPath, dataUrl });
          onValue(publicPath);
          pathInput.value = publicPath;
          preview.src = dataUrl;
          saveStatus.textContent = 'Image ready. Click Save changes to publish it.';
        });

        controls.append(pathInput, fileInput);
        row.append(preview, controls);
        return row;
      }

      function renderTabs() {
        tabs.innerHTML = '';
        Object.entries(sections).forEach(([key, section]) => {
          const button = document.createElement('button');
          button.className = `tab ${key === activeSection ? 'active' : ''}`;
          button.type = 'button';
          button.textContent = section.label;
          button.addEventListener('click', () => {
            activeSection = key;
            render();
          });
          tabs.appendChild(button);
        });
      }

      function renderSlots(section) {
        content.sitePhotos = content.sitePhotos || {};

        section.slots.forEach((slot) => {
          const card = document.createElement('article');
          card.className = 'item';

          const label = document.createElement('label');
          label.className = 'full';
          label.textContent = slot.label;
          label.appendChild(
            buildImageControl(content.sitePhotos[slot.key] || '', (value) => {
              content.sitePhotos[slot.key] = value;
            })
          );

          card.appendChild(label);
          contentList.appendChild(card);
        });
      }

      function toDateKey(year, month, day) {
        return `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      }

      function formatDateKey(dateKey) {
        const [year, month, day] = dateKey.split('-').map(Number);
        return `${monthNames[month - 1]} ${day}, ${year}`;
      }

      function getNote(dateKey) {
        return (content.tastingCalendar || []).find((entry) => entry.date === dateKey);
      }

      function renderCalendar() {
        content.tastingCalendar = content.tastingCalendar || [];

        const wrap = document.createElement('article');
        wrap.className = 'item';

        const toolbar = document.createElement('div');
        toolbar.className = 'cal-toolbar';

        const title = document.createElement('span');
        title.className = 'cal-title';
        title.textContent = `${monthNames[calCursor.getMonth()]} ${calCursor.getFullYear()}`;

        const nav = document.createElement('div');
        nav.className = 'cal-nav';

        const prev = document.createElement('button');
        prev.className = 'button secondary';
        prev.type = 'button';
        prev.textContent = '< Prev';
        prev.addEventListener('click', () => {
          calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() - 1, 1);
          render();
        });

        const next = document.createElement('button');
        next.className = 'button secondary';
        next.type = 'button';
        next.textContent = 'Next >';
        next.addEventListener('click', () => {
          calCursor = new Date(calCursor.getFullYear(), calCursor.getMonth() + 1, 1);
          render();
        });

        nav.append(prev, next);
        toolbar.append(title, nav);

        const grid = document.createElement('div');
        grid.className = 'cal-grid';

        weekdays.forEach((day) => {
          const cell = document.createElement('span');
          cell.className = 'cal-weekday';
          cell.textContent = day;
          grid.appendChild(cell);
        });

        const year = calCursor.getFullYear();
        const month = calCursor.getMonth();
        const firstWeekday = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        for (let i = 0; i < firstWeekday; i += 1) {
          const cell = document.createElement('span');
          cell.className = 'cal-day empty';
          grid.appendChild(cell);
        }

        for (let day = 1; day <= daysInMonth; day += 1) {
          const dateKey = toDateKey(year, month, day);
          const entry = getNote(dateKey);

          const cell = document.createElement('button');
          cell.type = 'button';
          cell.className = `cal-day ${entry ? 'has-note' : ''} ${selectedDate === dateKey ? 'selected' : ''}`;

          const number = document.createElement('span');
          number.className = 'cal-day-number';
          number.textContent = day;
          cell.appendChild(number);

          if (entry) {
            const note = document.createElement('span');
            note.className = 'cal-day-note';
            note.textContent = entry.note;
            cell.appendChild(note);
          }

          cell.addEventListener('click', () => {
            selectedDate = dateKey;
            render();
          });

          grid.appendChild(cell);
        }

        wrap.append(toolbar, grid);

        if (selectedDate) {
          const entry = getNote(selectedDate);
          const editorBox = document.createElement('div');
          editorBox.className = 'cal-editor';

          const label = document.createElement('label');
          label.textContent = `Tasting note for ${formatDateKey(selectedDate)}`;

          const textarea = document.createElement('textarea');
          textarea.placeholder = 'e.g. Fortaleza rep in store, tasting table 4-6 PM';
          textarea.value = entry ? entry.note : '';
          label.appendChild(textarea);

          const actions = document.createElement('div');
          actions.className = 'cal-editor-actions';

          const saveNote = document.createElement('button');
          saveNote.className = 'button';
          saveNote.type = 'button';
          saveNote.textContent = entry ? 'Update note' : 'Add note';
          saveNote.addEventListener('click', () => {
            const note = textarea.value.trim();

            if (!note) {
              saveStatus.textContent = 'Write a note first.';
              return;
            }

            if (entry) {
              entry.note = note;
            } else {
              content.tastingCalendar.push({ date: selectedDate, note });
            }

            saveStatus.textContent = 'Note added. Click Save changes to keep it.';
            render();
          });

          actions.appendChild(saveNote);

          if (entry) {
            const removeNote = document.createElement('button');
            removeNote.className = 'button secondary danger';
            removeNote.type = 'button';
            removeNote.textContent = 'Remove note';
            removeNote.addEventListener('click', () => {
              content.tastingCalendar = content.tastingCalendar.filter((item) => item.date !== selectedDate);
              saveStatus.textContent = 'Note removed. Click Save changes to keep it.';
              render();
            });
            actions.appendChild(removeNote);
          }

          editorBox.append(label, actions);
          wrap.appendChild(editorBox);
        } else {
          const hint = document.createElement('p');
          hint.className = 'muted';
          hint.style.marginTop = '12px';
          hint.textContent = 'Click a day to add or edit a tasting note.';
          wrap.appendChild(hint);
        }

        const upcoming = [...content.tastingCalendar].sort((a, b) => a.date.localeCompare(b.date));

        if (upcoming.length > 0) {
          const listWrap = document.createElement('div');
          listWrap.className = 'cal-upcoming';

          const heading = document.createElement('h3');
          heading.textContent = 'All scheduled tastings';
          listWrap.appendChild(heading);

          upcoming.forEach((item) => {
            const row = document.createElement('div');
            row.className = 'cal-upcoming-item';

            const when = document.createElement('strong');
            when.textContent = formatDateKey(item.date);

            const what = document.createElement('span');
            what.textContent = item.note;

            row.append(when, what);
            listWrap.appendChild(row);
          });

          wrap.appendChild(listWrap);
        }

        contentList.appendChild(wrap);
      }

      function render() {
        renderTabs();

        const section = sections[activeSection];
        sectionTitle.textContent = section.label;
        sectionHelp.textContent = section.help;
        contentList.innerHTML = '';
        addItemButton.classList.toggle('hide', Boolean(section.type));

        if (section.type === 'slots') {
          renderSlots(section);
          return;
        }

        if (section.type === 'calendar') {
          renderCalendar();
          return;
        }

        const items = content[activeSection] || [];

        items.forEach((item, index) => {
          const card = document.createElement('article');
          card.className = 'item';

          const grid = document.createElement('div');
          grid.className = 'field-grid';

          section.fields.forEach((field) => {
            const value = activeSection === 'updateTicker' ? item : item[field.name] || '';
            const label = document.createElement('label');
            label.className = field.type === 'textarea' || field.type === 'image' ? 'full' : '';
            label.textContent = field.label;

            if (field.type === 'textarea') {
              const textarea = document.createElement('textarea');
              textarea.value = value;
              textarea.addEventListener('input', (event) => setItemValue(index, field.name, event.target.value));
              label.appendChild(textarea);
            } else if (field.type === 'image') {
              label.appendChild(
                buildImageControl(value, (nextValue) => setItemValue(index, field.name, nextValue))
              );
            } else {
              const input = document.createElement('input');
              input.value = value;
              input.addEventListener('input', (event) => setItemValue(index, field.name, event.target.value));
              label.appendChild(input);
            }

            grid.appendChild(label);
          });

          const remove = document.createElement('button');
          remove.className = 'button secondary danger';
          remove.type = 'button';
          remove.textContent = 'Remove';
          remove.addEventListener('click', () => {
            content[activeSection].splice(index, 1);
            render();
          });

          card.append(grid, remove);
          contentList.appendChild(card);
        });
      }

      async function loadEditor() {
        password = document.getElementById('passwordInput').value;
        loginStatus.textContent = 'Opening editor...';

        try {
          const payload = await request('/api/owner-content', {
            method: 'POST',
            body: JSON.stringify({ password, action: 'load' })
          });
          content = payload.content;
          content.siteGallery = content.siteGallery || [];
          content.sitePhotos = content.sitePhotos || {};
          content.tastingCalendar = content.tastingCalendar || [];
          loginPanel.classList.add('hide');
          editor.classList.remove('hide');
          saveTop.classList.remove('hide');
          loginStatus.textContent = '';
          render();
        } catch (error) {
          loginStatus.textContent = error.message;
        }
      }

      async function saveEditor() {
        saveStatus.textContent = 'Saving changes...';
        saveTop.disabled = true;

        try {
          await request('/api/owner-content', {
            method: 'POST',
            body: JSON.stringify({
              password,
              action: 'save',
              content,
              images: pendingImages
            })
          });
          pendingImages = [];
          saveStatus.textContent = 'Saved. The live site will update after the next deployment finishes.';
        } catch (error) {
          saveStatus.textContent = error.message;
        } finally {
          saveTop.disabled = false;
        }
      }

      document.getElementById('loginButton').addEventListener('click', loadEditor);
      document.getElementById('passwordInput').addEventListener('keydown', (event) => {
        if (event.key === 'Enter') loadEditor();
      });
      addItemButton.addEventListener('click', () => {
        content[activeSection] = content[activeSection] || [];
        content[activeSection].push(sections[activeSection].empty());
        render();
      });
      document.getElementById('saveBottom').addEventListener('click', saveEditor);
      saveTop.addEventListener('click', saveEditor);
    </script>
  </body>
</html>
